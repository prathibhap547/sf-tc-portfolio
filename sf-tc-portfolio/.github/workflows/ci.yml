name: Salesforce CI/CD Pipeline

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: LWC Jest Tests (fast, ~2 min) ──────────────
  lwc-tests:
    name: LWC Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Jest tests with coverage
        run: npm test -- --coverage --watchAll=false
      
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: coverage/

  # ── Job 2: Apex Validation on Scratch Org (~15 min) ──
  validate-apex:
    name: Apex Tests + Coverage
    runs-on: ubuntu-latest
    needs: lwc-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate Dev Hub
        run: |
          echo "${{ secrets.DEVHUB_SFDX_URL }}" > devhub.json
          sf org login sfdx-url --sfdx-url-file devhub.json --alias DevHub --set-default-dev-hub

      - name: Create scratch org
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias ci-org \
            --duration-days 1 \
            --target-dev-hub DevHub

      - name: Deploy metadata
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org ci-org \
            --wait 20

      - name: Run Apex tests
        run: |
          sf apex run test \
            --target-org ci-org \
            --test-level RunLocalTests \
            --code-coverage \
            --result-format json \
            --output-dir ./test-results \
            --wait 30

      - name: Assert 85% coverage
        run: |
          python3 << 'EOF'
          import json
          import glob
          import sys
          
          files = glob.glob('./test-results/*.json')
          if not files:
            print("ERROR: No test results found")
            sys.exit(1)
          
          with open(files[0], 'r') as f:
            data = json.load(f)
          
          cov = data['summary']['testRunCoverage'].replace('%', '')
          print(f'Code Coverage: {cov}%')
          
          if float(cov) < 85:
            print("ERROR: Coverage below 85% threshold")
            sys.exit(1)
          else:
            print("SUCCESS: Coverage meets 85% threshold")
            sys.exit(0)
          EOF

      - name: Delete scratch org
        if: always()
        run: |
          sf org delete scratch \
            --target-org ci-org \
            --no-prompt || true

  # ── Job 3: Deploy to Staging on merge to main ─────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate-apex
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://test.salesforce.com
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli
      
      - name: Authenticate Staging
        run: |
          echo "${{ secrets.STAGING_SFDX_URL }}" > staging.json
          sf org login sfdx-url --sfdx-url-file staging.json --alias Staging
      
      - name: Deploy to Staging
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org Staging \
            --test-level RunLocalTests \
            --wait 20

  # ── Job 4: Deploy to Production (manual approval) ────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://login.salesforce.com
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli
      
      - name: Authenticate Production
        run: |
          echo "${{ secrets.PRODUCTION_SFDX_URL }}" > production.json
          sf org login sfdx-url --sfdx-url-file production.json --alias Production
      
      - name: Deploy to Production
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org Production \
            --test-level RunLocalTests \
            --wait 20 \
            --verbose
